<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שעון עברי</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="theme-toggle" aria-label="החלף מצב תאורה">☀️</button>

    <p class="page-title">שעון עברי</p>

    <div class="clock-border">
        <div id="clock">
            <span id="label">הַשָּׁעָה</span>
            <span id="hours"></span>
            <span id="minutes"></span>
            <span id="seconds"></span>
        </div>
    </div>

    <div class="alarm-border">
        <div id="alarm-panel">
            <label id="alarm-label">התראה</label>
            <div id="alarm-controls">
                <input id="alarm-input" type="text" inputmode="numeric" maxlength="5" placeholder="08:00" dir="ltr" />
                <button id="alarm-toggle" class="toggle-off" aria-label="הפעל התראה"></button>
            </div>
            <span id="alarm-status"></span>
        </div>
    </div>

    <script src="clock.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            themeToggle.textContent = '🌙';
        }
        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            themeToggle.textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>

</body>

</html>
